spring:
  profiles:
    active: "dev"

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

---

spring:
  config:
    activate:
      on-profile: "prod"

---

spring:
  config:
    activate:
      on-profile: "dev"

